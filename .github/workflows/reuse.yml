name: Reuse the other workflow

on:
  workflow_dispatch:
    inputs:
      who-to-greet:
        description: 'The name to greet'
        required: true
        default: 'World'
        type: string

jobs:
  call-workflow:
    uses: ./.github/workflows/reuseable.yml
    with:
      who-to-greet: ${{ github.event.inputs.who-to-greet }}
  use-output:
    runs-on: ubuntu-latest
    needs: [ call-workflow ]
    steps:
      - run: echo "Time was ${{ needs.call-workflow.outputs.time }}"
      
